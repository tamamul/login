name: marsa_cbt_mobile
description: Marsa CBT — Client Peserta
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & API
  dio: ^5.4.0
  retrofit: ^4.1.0

  # State management
  provider: ^6.1.2

  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3

  # UI
  google_fonts: ^6.2.1
  flutter_spinkit: ^5.2.1
  cached_network_image: ^3.3.1

  # Utils
  intl: ^0.19.0
  connectivity_plus: ^6.0.3
  device_info_plus: ^10.1.0
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  retrofit_generator: ^8.1.0
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
